<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060606"/>
      <stop offset="50%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#060606"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB800"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB800;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFB800;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <rect width="60" height="60" fill="none" stroke="rgba(255,184,0,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gold accent lines -->
  <rect x="80" y="100" width="3" height="430" rx="1.5" fill="url(#gold)" opacity="0.4"/>
  <rect x="1117" y="100" width="3" height="430" rx="1.5" fill="url(#gold)" opacity="0.4"/>

  <!-- Top glow -->
  <ellipse cx="600" cy="0" rx="500" ry="200" fill="url(#goldGlow)"/>

  <!-- DealBuddy Logo Text -->
  <text x="600" y="240" font-family="'Cinzel', 'Georgia', serif" font-size="88" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="6">DealBuddy</text>

  <!-- Tagline -->
  <text x="600" y="310" font-family="'Crimson Text', 'Georgia', serif" font-size="30" fill="#9CA3AF" text-anchor="middle" letter-spacing="4">CHALLENGE YOUR FRIENDS</text>

  <!-- Decorative divider -->
  <line x1="440" y1="350" x2="760" y2="350" stroke="#FFB800" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="350" r="4" fill="#FFB800" opacity="0.5"/>

  <!-- Features -->
  <text x="600" y="410" font-family="'Crimson Text', 'Georgia', serif" font-size="22" fill="#6B7280" text-anchor="middle" letter-spacing="2">Deals erstellen · Coins verdienen · Karten sammeln</text>

  <!-- CTA Badge -->
  <rect x="440" y="450" width="320" height="52" rx="26" fill="none" stroke="#FFB800" stroke-width="1.5" opacity="0.5"/>
  <text x="600" y="484" font-family="'Cinzel', 'Georgia', serif" font-size="18" fill="#FFB800" text-anchor="middle" letter-spacing="3" font-weight="700">JETZT STARTEN</text>

  <!-- Bottom URL -->
  <text x="600" y="570" font-family="monospace" font-size="16" fill="#4B5563" text-anchor="middle" letter-spacing="2">app.deal-buddy.app</text>
</svg>
